apiVersion: 1

datasources:
  # Prometheus (기본 데이터 소스 - 메트릭)
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    access: proxy
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s

  # Elasticsearch - Traces 인덱스
  - name: Elasticsearch-Traces
    type: elasticsearch
    uid: elasticsearch-traces
    url: http://elasticsearch:9200
    access: proxy
    editable: true
    database: otel-traces
    jsonData:
      index: otel-traces
      timeField: "@timestamp"
      esVersion: "8.0.0"
      logMessageField: body
      logLevelField: severity_text
      maxConcurrentShardRequests: 5

  # Elasticsearch - Logs 인덱스
  - name: Elasticsearch-Logs
    type: elasticsearch
    uid: elasticsearch-logs
    url: http://elasticsearch:9200
    access: proxy
    editable: true
    database: otel-logs
    jsonData:
      index: otel-logs
      timeField: "@timestamp"
      esVersion: "8.0.0"
      logMessageField: body
      logLevelField: severity_text
      maxConcurrentShardRequests: 5
