services:

  # ────────────────────────────────────────────────────────────
  # ClickHouse  (OpenLit 전용 스토리지)
  # ────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.4.1
    container_name: clickhouse
    environment:
      CLICKHOUSE_PASSWORD: ${OPENLIT_DB_PASSWORD:-OPENLIT}
      CLICKHOUSE_USER: ${OPENLIT_DB_USER:-default}
      CLICKHOUSE_DATABASE: ${OPENLIT_DB_NAME:-openlit}
      CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS: true
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./assets/clickhouse-config.xml:/etc/clickhouse-server/config.d/custom-config.xml:ro
      - ./assets/clickhouse-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    ports:
      - "9000:9000"
      - "8123:8123"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=$${CLICKHOUSE_USER} --password=$${CLICKHOUSE_PASSWORD} --query='SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 100s
    restart: always
    networks:
      - observability

  # ────────────────────────────────────────────────────────────
  # OpenLit  (LLM Observability UI + 내장 OTel Collector)
  #   - 4317/4318 은 호스트에 노출하지 않음
  #     (외부 OTel Collector 가 내부 네트워크로 전달)
  # ────────────────────────────────────────────────────────────
  openlit:
    image: ghcr.io/openlit/openlit:1.17.1
    container_name: openlit
    environment:
      TELEMETRY_ENABLED: "true"
      INIT_DB_HOST: clickhouse
      INIT_DB_PORT: 8123
      INIT_DB_DATABASE: ${OPENLIT_DB_NAME:-openlit}
      INIT_DB_USERNAME: ${OPENLIT_DB_USER:-default}
      INIT_DB_PASSWORD: ${OPENLIT_DB_PASSWORD:-OPENLIT}
      SQLITE_DATABASE_URL: file:/app/client/data/data.db
      PORT: ${PORT:-3000}
      DOCKER_PORT: ${PORT:-3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OPAMP_ENVIRONMENT: ${OPAMP_ENVIRONMENT:-production}
      OPAMP_CERTS_DIR: "/app/opamp/certs"
      OPAMP_TLS_INSECURE_SKIP_VERIFY: ${OPAMP_TLS_INSECURE_SKIP_VERIFY:-false}
      OPAMP_TLS_REQUIRE_CLIENT_CERT: ${OPAMP_TLS_REQUIRE_CLIENT_CERT:-true}
      OPAMP_TLS_MIN_VERSION: ${OPAMP_TLS_MIN_VERSION:-1.2}
      OPAMP_TLS_MAX_VERSION: ${OPAMP_TLS_MAX_VERSION:-1.3}
      OPAMP_LOG_LEVEL: ${OPAMP_LOG_LEVEL:-info}
    env_file:
      - path: .env
        required: false
    ports:
      - "${PORT:-3000}:${PORT:-3000}"   # OpenLit UI
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - openlit-data:/app/client/data
      - ./assets/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://openlit:3000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - observability

  # ────────────────────────────────────────────────────────────
  # 외부 OTel Collector  (앱의 단일 진입점)
  #   Traces/Logs → OpenLit (ClickHouse) + Elasticsearch
  #   Metrics     → OpenLit (ClickHouse) + Prometheus 스크레이프 엔드포인트
  # ────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4317:4317"    # OTLP gRPC  (앱 → 여기로 전송)
      - "4318:4318"    # OTLP HTTP  (앱 → 여기로 전송)
      - "8889:8889"    # Prometheus 스크레이프 엔드포인트
      - "13133:13133"  # Health check
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml:ro
    depends_on:
      openlit:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - observability

  # ────────────────────────────────────────────────────────────
  # Elasticsearch
  # ────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: always
    networks:
      - observability

  # ────────────────────────────────────────────────────────────
  # Kibana
  # ────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: always
    networks:
      - observability

  # ────────────────────────────────────────────────────────────
  # Prometheus
  # ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - observability

  # ────────────────────────────────────────────────────────────
  # Grafana  (호스트 3001 → 컨테이너 3000, OpenLit 과 충돌 방지)
  # ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: always
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  clickhouse-data:
  openlit-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:
